<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>尖叫网站 | 校园祭</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @font-face {
            font-family: 'Culiu';
            src: url('fonts/horror.woff') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            background-color: #ffe6f5;
            background-image: url('images/fly.gif');
            background-repeat: repeat;
            font-family: 'Culiu', system-ui, 'Segoe UI', 'Noto Sans', sans-serif;
            padding: 20px 16px 50px 16px;
            min-height: 100vh;
        }

        .main-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .nav-btn {
            display: inline-block;
            background: transparent;
            border: 2px solid #000000;
            border-radius: 0;
            padding: 2px 16px;
            line-height: 1.3;
            font-family: '黑体', '黑体', 'Times New Roman', serif;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            color: #2b00ff;
            transition: color 0.2s ease;
            text-align: center;
            cursor: pointer;
            min-width: 70px;
        }

        .nav-btn:hover {
            color: #ff0000;
        }

        @media (max-width: 600px) {
            .nav-bar {
                gap: 12px;
            }
            .nav-btn {
                padding: 2px 12px;
                font-size: 0.9rem;
                min-width: 60px;
            }
        }

        .divider-strip {
            width: 100%;
            height: 10px;
            background-image: url('images/black.gif');
            background-repeat: space;
            background-position: center;
            background-size: auto 100%;
            margin: 20px 0 30px 0;
        }

        /* 你可以在这里添加校园祭页面特有的样式 */
        .page-content {
            text-align: center;
            padding: 40px 20px;
        }
        .page-content h1 {
            font-size: 2.5rem;
            color: #ff3399;
            font-family: '华文行楷', '宋体', serif;
            margin-bottom: 20px;
        }
        .page-content p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        @media (max-width: 600px) {
            .page-content h1 {
                font-size: 1.8rem;
            }
            .page-content p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="main-content">
    <!-- 导航栏（链接指向各个页面） -->
    <div class="nav-bar">
        <a href="index.html" class="nav-btn">首页</a>
        <a href="校园祭.html" class="nav-btn">校园祭</a>
        <a href="社团.html" class="nav-btn">社团</a>
        <a href="我是学生.html" class="nav-btn">我是学生</a>
        <a href="https://www.saizeriya.com.cn/Saizeriya/join" class="nav-btn" target="_blank">加盟商</a>
    </div>

    <div class="divider-strip"></div>

    <!-- ========== 校园祭专属内容（从这里开始自由编辑） ========== -->
    <div class="page-content">
        <h1>🎉 校园祭特别企划 🎉</h1>
        <p>这里是校园祭页面的内容，你可以自由添加文字、图片、按钮等。</p>
        <p>例如：摊位介绍、时间安排、表演节目单、地图导航等。</p>
        <p>所有样式会继承网站的整体风格（背景、字体、颜色）。</p>
        <!-- 你可以继续添加更多内容 -->
    </div>
    <!-- ========== 内容结束 ========== -->
</div>
</body>
</html>
